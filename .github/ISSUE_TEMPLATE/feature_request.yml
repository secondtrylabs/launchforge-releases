name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for LaunchForge? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What would you like LaunchForge to do?
      placeholder: I'd like LaunchForge to...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
      placeholder: This would help because...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important — I work around it today
        - Critical — blocking my workflow

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links to similar features in other apps, etc.
